{% extends 'base.html' %}

{% block title %}Login - School Management System{% endblock %}

{% block auth_content %}
<div class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">
          <i class="fas fa-graduation-cap"></i>
        </div>
        <h1>Welcome Back</h1>
        <p>Sign in to access your dashboard</p>
      </div>

      <!-- Messages -->
      {% if messages %}
        <div class="messages" style="margin-bottom: 1rem;">
          {% for message in messages %}
            <div style="
              padding: 0.75rem 1rem;
              border-radius: var(--radius);
              margin-bottom: 0.5rem;
              font-size: 0.875rem;
              {% if message.tags == 'success' %}background: var(--success-light); color: var(--success);{% endif %}
              {% if message.tags == 'error' %}background: var(--danger-light); color: var(--danger);{% endif %}
              {% if message.tags == 'warning' %}background: var(--warning-light); color: var(--warning);{% endif %}
              {% if message.tags == 'info' %}background: var(--info-light); color: var(--info);{% endif %}
            ">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}

      <form method="post" class="login-form">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div style="position: relative;">
            <i class="fas fa-envelope" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-light);"></i>
            <input type="email" name="email" class="form-input" placeholder="Enter your email" style="padding-left: 2.75rem;" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div style="position: relative;">
            <i class="fas fa-lock" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-light);"></i>
            <input type="password" name="password" class="form-input" placeholder="Enter your password" style="padding-left: 2.75rem;" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Role</label>
          <div style="position: relative;">
            <i class="fas fa-user-tag" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-light); z-index: 1;"></i>
            <select name="role" class="form-select" style="padding-left: 2.75rem;">
              <option value="admin">Administrator</option>
              <option value="teacher">Teacher</option>
            </select>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg">
          <i class="fas fa-sign-in-alt"></i>
          Sign In
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
